name: Tauri Build
description: Shared pnpm, Node, Rust, cache, install, and build steps for Tauri bundles

inputs:
  build_command:
    description: Command to run after dependencies are installed
    required: true
  rust_targets:
    description: Optional comma-separated Rust targets to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

    - name: Setup Node
      uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
      with:
        node-version: lts/*
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Rust stable with targets
      if: inputs.rust_targets != ''
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust_targets }}

    - name: Install Rust stable
      if: inputs.rust_targets == ''
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src-tauri/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build bundle
      shell: bash
      run: ${{ inputs.build_command }}
