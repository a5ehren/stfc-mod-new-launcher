name: Tauri Package
description: Shared release packaging for Tauri macOS, Windows, and Linux bundles

inputs:
  platform:
    description: Target platform to package for
    required: true
  arch:
    description: Target architecture to package for
    required: false
    default: x64
  windows_file_name:
    description: Optional explicit Windows MSI filename
    required: false
    default: ""
  release_tag:
    description: Release tag used in the packaged asset name
    required: true
  asset_dir:
    description: Directory where packaged assets should be written
    required: false
    default: release-assets

runs:
  using: composite
  steps:
    - name: Package macOS release asset
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        set -euo pipefail
        bundle_dir="$(find src-tauri/target -type d -name '*.app' -path '*/bundle/*' | head -n 1)"
        if [ -z "$bundle_dir" ]; then
          echo "No macOS .app bundle found"
          exit 1
        fi
        mkdir -p "${{ inputs.asset_dir }}"
        asset_name="stfc-mod-new-launcher-${{ inputs.release_tag }}-macos-universal.tar.gz"
        tar -czf "${{ inputs.asset_dir }}/$asset_name" -C "$(dirname "$bundle_dir")" "$(basename "$bundle_dir")"

    - name: Package Windows release asset
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        $assetDir = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.asset_dir }}"
        New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

        $bundleRoot = Join-Path $env:GITHUB_WORKSPACE "src-tauri\target"
        $files = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.msi |
          Where-Object { $_.FullName -match '\\bundle\\' }

        if (-not $files) {
          Write-Error "No Windows installer bundle found"
          exit 1
        }

        foreach ($file in $files) {
          $targetName = "${{ inputs.windows_file_name }}"
          if ([string]::IsNullOrWhiteSpace($targetName)) {
            $archSuffix = "${{ inputs.arch }}"
            $targetName = "stfc-mod-new-launcher-${{ inputs.release_tag }}-windows-$archSuffix.msi"
          }
          Copy-Item $file.FullName -Destination (Join-Path $assetDir $targetName)
        }

    - name: Package Linux release assets
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        set -euo pipefail
        asset_dir="${{ inputs.asset_dir }}"
        mkdir -p "$asset_dir"

        deb_file="$(find src-tauri/target -type f -name '*.deb' -path '*/bundle/*' | head -n 1)"
        appimage_file="$(find src-tauri/target -type f -name '*.AppImage' -path '*/bundle/*' | head -n 1)"

        if [ -z "$deb_file" ] || [ -z "$appimage_file" ]; then
          echo "Missing Linux bundle artifacts"
          echo "deb: ${deb_file:-not found}"
          echo "appimage: ${appimage_file:-not found}"
          exit 1
        fi

        arch_suffix="${{ inputs.arch }}"
        release_tag="${{ inputs.release_tag }}"
        cp "$deb_file" "$asset_dir/stfc-mod-new-launcher-${release_tag}-linux-${arch_suffix}.deb"
        cp "$appimage_file" "$asset_dir/stfc-mod-new-launcher-${release_tag}-linux-${arch_suffix}.AppImage"
