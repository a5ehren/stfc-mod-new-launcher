name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Setup Biome
        uses: biomejs/setup-biome@a05c02a1304287da45f13648675a70d5841acdbc
        with:
          version: latest
      - name: Run Biome
        run: biome ci .
