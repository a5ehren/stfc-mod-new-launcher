name: PR Build

on:
  pull_request:

jobs:
  build-macos:
    name: Dry-run macOS build
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Build macOS universal bundle
        uses: ./.github/actions/tauri-build
        with:
          rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          build_command: pnpm build:macos

  build-windows:
    name: Dry-run Windows build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Build Windows MSI bundle
        uses: ./.github/actions/tauri-build
        with:
          build_command: pnpm build:windows

  build-linux:
    name: Dry-run Linux build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Build Linux deb/appimage
        uses: ./.github/actions/tauri-build
        with:
          build_command: pnpm build:linux
