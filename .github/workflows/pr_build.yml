name: PR Build

on:
  pull_request:

jobs:
  build-macos:
    name: Dry-run macOS build
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build macOS universal bundle
        uses: ./.github/actions/tauri-build
        with:
          rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          build_command: pnpm build:macos

  build-windows:
    name: Dry-run Windows build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build Windows MSI bundle
        uses: ./.github/actions/tauri-build
        with:
          build_command: pnpm build:windows
