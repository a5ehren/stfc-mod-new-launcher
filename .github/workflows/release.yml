name: Release

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS bundle
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build macOS universal bundle
        uses: ./.github/actions/tauri-build
        with:
          rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          build_command: pnpm build:macos

      - name: Package macOS release asset
        uses: ./.github/actions/tauri-package
        with:
          platform: macos
          release_tag: ${{ github.event.release.tag_name }}

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*.dmg

  build-windows:
    name: Build Windows bundle
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Build Windows bundle
        uses: ./.github/actions/tauri-build
        with:
          build_command: pnpm build:windows

      - name: Package Windows release assets
        uses: ./.github/actions/tauri-package
        with:
          platform: windows
          arch: x64
          windows_file_name: stfc-mod-new-launcher-${{ github.event.release.tag_name }}-windows-x64.msi
          release_tag: ${{ github.event.release.tag_name }}

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/stfc-mod-new-launcher-${{ github.event.release.tag_name }}-windows-x64.msi

  build-linux:
    name: Build Linux bundle
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Build Linux bundle
        uses: ./.github/actions/tauri-build
        with:
          build_command: pnpm build:linux

      - name: Package Linux release assets
        uses: ./.github/actions/tauri-package
        with:
          platform: linux
          arch: x64
          release_tag: ${{ github.event.release.tag_name }}

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/stfc-mod-new-launcher-${{ github.event.release.tag_name }}-linux-x64.deb
            release-assets/stfc-mod-new-launcher-${{ github.event.release.tag_name }}-linux-x64.AppImage
